services:
  - type: web
    name: football-scout-backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install --prefer-binary -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: API_FOOTBALL_BASE_URL
        value: https://v3.football.api-sports.io
      - key: PYTHON_VERSION
        value: 3.11.9